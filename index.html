<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Order Summary</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700&family=Red+Hat+Display:wght@300;400;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

    <!-- Background -->
    <div class="hero">
        <img src="images/pattern-background-mobile.svg" alt="background">
    </div>

    <!-- Main image -->
    <img class="Card-image" src="images/illustration-hero.svg" alt="hero image">

    <!-- Content -->
    <div class="container1">

        <h1>Order Summary</h1>

        <p>
            You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!
        </p>

        <!-- Plan -->
        <div class="left-container">

            <img src="images/icon-music.svg" alt="music icon">

            <div class="plan-text">
                <h2>Annual Plan</h2>
                <p>$59.99/year</p>
            </div>

            <h3 class="change">Change</h3>

        </div>

        <button>Proceed to Payment</button>

        <h4>Cancel Order</h4>

    </div>

</div>

</body>
</html>
